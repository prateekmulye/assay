<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#050403" />
    <meta
      name="description"
      content="Assay — live multi-agent equity research. A 12-node LangGraph pipeline streams a BUY/SELL/HOLD verdict with conviction, cost, and latency in real time."
    />
    <title>Assay — multi-agent equity research</title>
  </head>
  <body>
    <!--
      Diffuse Surface Map (DESIGN.md §7): fractal noise passed through a
      lighting pass so the grain reads as a milled bump map under the app's
      single declared lamp (azimuth 250, elevation 62 — above, 10° left).
      Defined once here, outside the React tree, GPU-cached, never animated.
    -->
    <svg
      width="0"
      height="0"
      aria-hidden="true"
      style="position: absolute; pointer-events: none"
    >
      <filter id="fin-grain">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.9"
          numOctaves="3"
          stitchTiles="stitch"
          result="noise"
        />
        <feDiffuseLighting
          in="noise"
          lighting-color="#fff"
          surfaceScale="1.6"
          result="lit"
        >
          <feDistantLight azimuth="250" elevation="62" />
        </feDiffuseLighting>
        <feComposite in="lit" in2="SourceGraphic" operator="in" />
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
