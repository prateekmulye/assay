<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0c12" />
    <meta
      name="description"
      content="FinResearchAI — live multi-agent equity research. A 12-node LangGraph pipeline streams a BUY/SELL/HOLD verdict with conviction, cost, and latency in real time."
    />
    <title>FinResearch — multi-agent equity research</title>
  </head>
  <body>
    <!--
      Programmatic Organic Imperfection ("texture glue"): a single fixed
      fractal-noise filter is referenced by the app surface in CSS. Defining it
      once here keeps it out of the React tree and lets the GPU cache it.
    -->
    <svg
      width="0"
      height="0"
      aria-hidden="true"
      style="position: absolute; pointer-events: none"
    >
      <filter id="fin-grain">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.65"
          numOctaves="3"
          stitchTiles="stitch"
        />
        <feColorMatrix type="saturate" values="0" />
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
