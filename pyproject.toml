[project]
name = "finresearchai"
version = "0.2.0"
description = "Debate-driven multi-agent financial research system"
requires-python = ">=3.11"
dependencies = [
    "langgraph==1.0.4",
    "langchain-core==1.2.5",
    "langchain-openai==1.1.6",
    "pydantic==2.12.5",
    "pydantic-settings==2.12.0",
    "pyyaml==6.0.2",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
# memory  = ["chromadb>=0.5", "fastembed>=0.4"]
web     = ["firecrawl-py==4.28.2"]
data    = ["yfinance==0.2.66", "tradingview-ta==3.3.0"]
# api     = ["fastapi>=0.125", "uvicorn>=0.30", "sse-starlette>=2.1", "httpx>=0.27"]
dev = [
    "pytest==8.4.2",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
    "ruff>=0.6",
    "mypy>=1.11",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*", "scripts*"]
namespaces = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --ignore=tests/test_flow.py --ignore=tests/test_international.py --ignore=tests/test_ui_logic.py"
asyncio_mode = "auto"
markers = [
    "live: hits a real external API; skipped unless RUN_LIVE=1",
]

[tool.ruff]
line-length = 100
target-version = "py311"
