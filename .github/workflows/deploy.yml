# .github/workflows/deploy.yml
#
# WP-12 deploy pipeline. INERT BY DEFAULT: every job is gated on the repository
# *variable* DEPLOY_ENABLED == 'true' (Settings → Secrets and variables →
# Actions → Variables — variables work in `if:`, secrets don't). Until the VPS
# is provisioned and DEPLOY_ENABLED + the three VPS_* secrets are set, this
# workflow runs as all-skipped (green no-op). Enablement runbook: docs/deploy.md.
#
#   build-push  GHCR image for the app (the stack's only built target),
#               tagged latest + commit sha — the artifact/rollback story.
#   deploy      SSH to the host: git fetch + checkout of the CI-validated SHA,
#               then `docker compose --profile tunnel up -d --build` (the
#               canonical update path from docs/deploy.md; the host builds
#               from source and does not consume GHCR — yet).
name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-push:
    name: build + push GHCR images
    # Skipped (green) until the repo variable DEPLOY_ENABLED is 'true'. On
    # workflow_run, also require that the CI run actually succeeded.
    if: >-
      vars.DEPLOY_ENABLED == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    # packages: write only where GHCR is pushed; the SSH job keeps the
    # workflow-default read-only token.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout (the exact commit CI validated)
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push app image (runtime target)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ghcr.io/prateekmulye/assay-app:latest
            ghcr.io/prateekmulye/assay-app:${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  deploy:
    name: deploy to VPS (checkout CI SHA + compose up)
    # needs: a skipped build-push skips this job too; the explicit gate is
    # belt-and-braces so a future `if: always()` edit can't fire SSH unarmed.
    needs: build-push
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: SSH to the VPS and roll the stack
        # SHA-pinned (receives the VPS private key — a repointed tag must not
        # be able to exfiltrate it). Update the comment when bumping.
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/assay
            # Deploy the exact commit CI validated — a commit landing between
            # CI start and this SSH must not ship under the previous green.
            git fetch origin main
            git checkout --detach ${{ github.event.workflow_run.head_sha || github.sha }}
            # Compose builds from source on the host (docs/deploy.md); the
            # GHCR image above is the rollback artifact, not the deploy path.
            # --profile tunnel brings cloudflared along (needs TUNNEL_TOKEN in .env).
            docker compose --profile tunnel -f docker-compose.prod.yml up -d --build
            docker compose --profile tunnel -f docker-compose.prod.yml ps
