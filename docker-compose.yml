# Dev-only warehouse database. The full prod stack lives in docker-compose.prod.yml.
# Start:   docker compose up -d db
# Connect: DATABASE_URL=postgresql+asyncpg://finresearch:finresearch@localhost:5433/finresearch
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: finresearch
      POSTGRES_PASSWORD: finresearch
      POSTGRES_DB: finresearch
    ports:
      - "127.0.0.1:5433:5432"  # loopback-only: dev DB must not listen on the LAN
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finresearch"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  pgdata:
