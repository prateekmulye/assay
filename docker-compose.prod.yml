# Production stack: cloudflared (Cloudflare Tunnel, outbound-only) + app
# (FastAPI serves the API *and* the built SPA) + db (pgvector).
#
#   cp .env.example .env   # keys, TUNNEL_TOKEN, a strong POSTGRES_PASSWORD
#   docker compose --profile tunnel -f docker-compose.prod.yml up -d --build
#
# ZERO inbound ports: cloudflared dials out to Cloudflare's edge, which
# terminates TLS for the domain. The app publishes 7860 on loopback only
# (local smoke/debug + CI); db stays fully internal.
# Full runbook: docs/deploy.md. (docker-compose.yml remains the dev-only db.)
services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    # The token binds this connector to one tunnel + its DNS route
    # (finresearch.prateekmulye.dev -> http://app:7860), all configured on the
    # Cloudflare side. Empty/missing token -> cloudflared exits loudly.
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:-}
    # Profile-gated so CI and tokenless local runs can boot app+db alone:
    # plain `up` skips this service; production adds `--profile tunnel`.
    profiles: ["tunnel"]
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  app:
    build:
      context: .
      target: runtime
    ports:
      # Loopback ONLY — never reachable from outside the host. Cloudflare's
      # tunnel is the sole public path in.
      - "127.0.0.1:7860:7860"
    environment:
      DATABASE_URL: postgresql+asyncpg://finresearch:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/finresearch
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      # Cloudflare appends the real client IP to X-Forwarded-For; the rate
      # limiter and demo quotas key on it (src/api/client_ip.py).
      TRUST_PROXY: "1"
      COLLECTOR_ENABLED: "1"
      # Same-origin in practice (the app serves SPA + API together); locked anyway.
      ALLOWED_ORIGINS: https://${PUBLIC_DOMAIN:-localhost}
      RUNS_DIR: /app/runs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Deterministic offline demo mode — leave 0 in production.
      APP_FAKE_LLM: ${APP_FAKE_LLM:-0}
    volumes:
      - app_runs:/app/runs
    healthcheck:
      # urllib instead of curl: nothing extra to install in the slim image.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:7860/healthz', timeout=3).status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s # entrypoint may spend up to ~30s waiting on migrations
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: finresearch
      # Required — no default in the prod file by design.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: finresearch
    # No host ports: reachable only from the app container.
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finresearch -d finresearch"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

volumes:
  pgdata_prod:
  app_runs:
